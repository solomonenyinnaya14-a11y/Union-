<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Union Meeting Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #1E3A8A; --blue: #2563EB; --dark: #1E1E2A; --gray: #111827; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--gray); color: white; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 16px 24px; background: var(--dark); display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.2rem; font-weight: 700; }
       .room-id { background: var(--blue); padding: 6px 12px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; font-weight: 600; }
       .video-container { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; }
       .video-box { background: #000; border-radius: 12px; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
       .label { position: absolute; bottom: 12px; left: 12px; background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 8px; font-size: 0.9rem; font-weight: 500; }
       .controls { padding: 16px; background: var(--dark); display: flex; justify-content: center; gap: 16px; }
       .control-btn { background: #374151; border: none; color: white; width: 56px; height: 56px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; transition: 0.2s; }
       .control-btn:hover { background: #4B5563; }
       .control-btn.end { background: #DC2626; }
       .control-btn.end:hover { background: #B91C1C; }
        #status { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; color: #9CA3AF; pointer-events: none; }
        @media (max-width: 768px) {.video-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <h1>📹 Union Meeting</h1>
        <div class="room-id" id="roomIdDisplay" onclick="copyRoom()">Room: loading...</div>
    </header>

    <div class="video-container">
        <div class="video-box">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="label">You</div>
        </div>
        <div class="video-box">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="label">Friend</div>
            <div id="status">Waiting for someone to join...<br>Click room ID to copy link</div>
        </div>
    </div>

    <div class="controls">
        <button class="control-btn" id="micBtn" title="Mute">🎤</button>
        <button class="control-btn" id="camBtn" title="Camera">📹</button>
        <button class="control-btn" id="screenBtn" title="Share Screen">🖥️</button>
        <button class="control-btn end" id="endBtn" title="Leave">📞</button>
    </div>

    <script src="room.js"></script>
</body>
</html>

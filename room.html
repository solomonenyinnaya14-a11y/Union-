<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Union Room</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: #000; color: #fff; overflow: hidden; height: 100vh; }

    #videos { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; padding: 8px; height: 100vh; padding-bottom: 100px; overflow-y: auto; }
    video { width: 100%; height: 200px; object-fit: cover; background: #111; border-radius: 12px; }
    #localVideo { border: 2px solid #2563eb; }

    #roomInfo { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 8px 14px; border-radius: 20px; font-size: 14px; z-index: 10; display: flex; align-items: center; gap: 8px; }
    #copyBtn { background: #2563eb; border: none; color: white; padding: 4px 10px; border-radius: 12px; cursor: pointer; font-weight: 600; }

    #controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 16px; background: rgba(30,30,30,0.8); padding: 12px 20px; border-radius: 30px; backdrop-filter: blur(10px); z-index: 20; transition: bottom 0.3s ease; }
   .btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: #333; color: white; font-size: 22px; cursor: pointer; }
   .btn.active { background: #ff3b30; }
   .btn.chat { background: #2563eb; }
   .btn.leave { background: #ff3b30; }

    #chatPanel { position: absolute; bottom: 0; left: 0; width: 100%; height: 50vh; background: #1a1a1a; display: none; flex-direction: column; border-top: 1px solid #333; z-index: 30; }
    #chatMessages { flex: 1; overflow-y: auto; padding: 15px; }
   .msg { margin-bottom: 10px; font-size: 15px; }
   .msg b { color: #2563eb; }
    #chatInputBox { display: flex; padding: 10px; border-top: 1px solid #333; background: #222; }
    #chatInput { flex: 1; padding: 10px 14px; border-radius: 20px; border: none; background: #333; color: white; outline: none; }
    #sendBtn { background: #2563eb; border: none; color: white; padding: 10px 16px; border-radius: 20px; margin-left: 8px; font-weight: 600; cursor: pointer; }
    #closeChat { position: absolute; top: 10px; right: 15px; font-size: 24px; background: none; border: none; color: #aaa; cursor: pointer; z-index: 31; }
  </style>
</head>
<body>
  <div id="videos">
    <video id="localVideo" autoplay playsinline muted></video>
  </div>

  <div id="roomInfo">
    Room: <span id="roomId"></span>
    <button id="copyBtn" onclick="copyRoom()">Copy</button>
  </div>

  <div id="controls">
    <button class="btn" id="micBtn" onclick="toggleMic()">🎤</button>
    <button class="btn" id="camBtn" onclick="toggleCam()">📹</button>
    <button class="btn chat" onclick="toggleChat()">💬</button>
    <button class="btn leave" onclick="leave()">📞</button>
  </div>

  <div id="chatPanel">
    <button id="closeChat" onclick="toggleChat()">×</button>
    <div id="chatMessages"></div>
    <div id="chatInputBox">
      <input type="text" id="chatInput" placeholder="Send to everyone...">
      <button id="sendBtn" onclick="sendChat()">Send</button>
    </div>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="room.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Union Room</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: #000; color: #fff; overflow: hidden; height: 100vh; }

    /* SQUARE GRID FOR 10 PEOPLE - NO TRIANGLE */
    #videos { 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      grid-template-rows: repeat(4, 1fr); /* 4 rows */
      gap: 4px; 
      padding: 4px; 
      height: calc(100vh - 90px);
      width: 100vw;
      overflow: hidden;
    }
    video { 
      width: 100%; 
      height: 100%;
      aspect-ratio: 1 / 1; /* FORCE SQUARE */
      object-fit: cover; 
      background: #111; 
      border-radius: 8px; 
      position: relative;
    }
   .name-tag {
      position: absolute;
      bottom: 4px;
      left: 4px;
      background: rgba(0,0,0,0.7);
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      z-index: 5;
    }
   .video-wrapper { position: relative; width:100%; height:100%; }

    #roomInfo { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 20px; font-size: 13px; z-index: 10; display: flex; align-items: center; gap: 6px; }
    #copyBtn { background: #2563eb; border: none; color: white; padding: 3px 8px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 12px; }

    #controls { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 14px; background: rgba(30,30,30,0.9); padding: 10px 16px; border-radius: 30px; backdrop-filter: blur(10px); z-index: 20; }
   .btn { width: 48px; height: 48px; border-radius: 50%; border: none; background: #333; color: white; font-size: 20px; cursor: pointer; }
   .btn.active { background: #ff3b30; }
   .btn.chat { background: #2563eb; }
   .btn.leave { background: #ff3b30; }

    #chatPanel { position: absolute; bottom: 0; left: 0; width: 100%; height: 45vh; background: #1a1a1a; display: none; flex-direction: column; border-top: 1px solid #333; z-index: 30; }
    #chatMessages { flex: 1; overflow-y: auto; padding: 12px; }
   .msg { margin-bottom: 8px; font-size: 14px; }
   .msg b { color: #2563eb; }
    #chatInputBox { display: flex; padding: 8px; border-top: 1px solid #333; background: #222; }
    #chatInput { flex: 1; padding: 9px 12px; border-radius: 18px; border: none; background: #333; color: white; outline: none; }
    #sendBtn { background: #2563eb; border: none; color: white; padding: 9px 14px; border-radius: 18px; margin-left: 6px; font-weight: 600; cursor: pointer; }
    #closeChat { position: absolute; top: 8px; right: 12px; font-size: 22px; background: none; border: none; color: #aaa; cursor: pointer; z-index: 31; }
  </style>
</head>
<body>
  <div id="videos"></div>

  <div id="roomInfo">
    Room: <span id="roomId"></span>
    <button id="copyBtn" onclick="copyRoom()">Copy</button>
  </div>

  <div id="controls">
    <button class="btn" id="micBtn" onclick="toggleMic()">🎤</button>
    <button class="btn" id="camBtn" onclick="toggleCam()">📹</button>
    <button class="btn chat" onclick="toggleChat()">💬</button>
    <button class="btn leave" onclick="leave()">📞</button>
  </div>

  <div id="chatPanel">
    <button id="closeChat" onclick="toggleChat()">×</button>
    <div id="chatMessages"></div>
    <div id="chatInputBox">
      <input type="text" id="chatInput" placeholder="Send to everyone...">
      <button id="sendBtn" onclick="sendChat()">Send</button>
    </div>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="room.js"></script>
</body>
</html>

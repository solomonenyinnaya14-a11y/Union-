<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Union - Room</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<div id="roomInfo">
  Room: <b id="roomId"></b> 
  <button id="copyBtn" onclick="copyRoom()">Copy</button>
</div>

<div id="videos">
  <video id="localVideo" autoplay muted playsinline></video>
  <video id="remoteVideo" autoplay playsinline></video>
</div>

<div id="controls">
  <button id="micBtn" onclick="toggleMic()">🎤</button>
  <button id="camBtn" onclick="toggleCam()">📹</button>
  <button onclick="leave()" style="background:#ef4444">📞</button>
</div>

<!-- Chat UI -->
<div id="chatPanel">
  <div id="chatHeader">
    Chat
    <span onclick="toggleChat()">✕</span>
  </div>
  <div id="chatMessages"></div>
  <div id="chatInputWrap">
    <input id="chatInput" type="text" placeholder="Send a message..." onkeydown="if(event.key==='Enter') sendChat()">
    <button id="sendBtn" onclick="sendChat()">Send</button>
  </div>
</div>
<button id="chatBtn" onclick="toggleChat()">💬</button>

<script src="room.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#000;color:#fff;margin:0;overflow:hidden}
video{width:100%;height:100vh;object-fit:cover}
#local{position:absolute;top:20px;right:20px;width:120px;height:160px;border-radius:12px}
#chat{position:absolute;bottom:0;width:100%;height:40%;background:#111;display:none;flex-direction:column}
#msgs{flex:1;overflow-y:auto;padding:10px}
#input{display:flex;padding:10px}
#input input{flex:1;padding:10px;border-radius:20px;border:none;background:#222;color:#fff}
#controls{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px}
button{padding:12px 20px;border-radius:30px;border:none}
</style>
</head>
<body>
<video id="remote" autoplay playsinline></video>
<video id="local" autoplay playsinline muted></video>

<div id="controls">
  <button onclick="toggleChat()">💬</button>
  <button onclick="copy()">Copy Link</button>
</div>

<div id="chat">
  <div id="msgs"></div>
  <div id="input">
    <input id="msg" placeholder="Send...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const ROOM = params.get('room');
const IS_HOST = params.get('host') === '1';
let peer, conn, localStream;

async function init() {
  localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  document.getElementById('local').srcObject = localStream;

  peer = new Peer(ROOM + (IS_HOST? '-host' : '-guest-'+Date.now()), {
    config: {'iceServers': [{urls:'stun:stun.l.google.com:19302'}]}
  });

  peer.on('open', () => {
    if(!IS_HOST) {
      conn = peer.connect(ROOM + '-host');
      conn.on('data', d => addMsg('Friend', d));
      peer.call(ROOM + '-host', localStream).on('stream', s => document.getElementById('remote').srcObject = s);
    }
  });

  peer.on('connection', c => {
    conn = c;
    conn.on('data', d => addMsg('Friend', d));
  });
  peer.on('call', call => {
    call.answer(localStream);
    call.on('stream', s => document.getElementById('remote').srcObject = s);
  });
}

function toggleChat(){ document.getElementById('chat').style.display = document.getElementById('chat').style.display==='flex'?'none':'flex' }
function send(){ 
  const m = document.getElementById('msg').value; 
  if(conn && conn.open) conn.send(m); 
  addMsg('You', m); 
  document.getElementById('msg').value='';
}
function addMsg(who, txt){ document.getElementById('msgs').innerHTML += `<div><b>${who}:</b> ${txt}</div>` }
function copy(){ navigator.clipboard.writeText(window.location.href.split('&')[0]); alert('Copied') }

init();
</script>
</body>
</html>

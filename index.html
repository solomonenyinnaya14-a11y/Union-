<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Union - Meet Together</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background:#fff; color:#000; }
    header { display:flex; justify-content:space-between; padding:20px 40px; align-items:center; border-bottom:1px solid #eee; }
  .logo { font-weight:700; font-size:20px; color:#007AFF; }
    header nav button { margin-left:10px; padding:10px 20px; border-radius:8px; border:none; font-weight:600; cursor:pointer; font-size:15px; }
 .btn-primary { background:#007AFF; color:#fff; }
 .btn-ghost { background:#f2f2f2; color:#000; }
  .hero { text-align:center; padding:120px 20px; }
  .hero h1 { font-size:48px; font-weight:800; line-height:1.2; }
  .hero h1 span { color:#007AFF; }
  .hero p { margin:20px 0 40px; color:#555; font-size:18px; }
  .hero button { padding:14px 28px; font-size:16px; border-radius:10px; margin:0 8px; }
 .steps { display:flex; justify-content:center; gap:60px; padding:60px 20px; background:#f9f9f9; }
 .step { text-align:center; }
 .step h3 { margin-bottom:8px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">Union</div>
    <nav>
      <button class="btn-ghost" onclick="joinCall()">Join</button>
      <button class="btn-primary" onclick="startCall()">Start a Call</button>
    </nav>
  </header>

  <section class="hero">
    <h1>Meet Together.<br><span>Build Together.</span></h1>
    <p>Start a video meeting in 1 click. No downloads, no accounts.</p>
    <button class="btn-primary" onclick="startCall()">Start a Call</button>
    <button class="btn-ghost" onclick="joinCall()">Join a Call</button>
    <p style="font-size:13px; color:#888; margin-top:20px;">Free. Secure. Works in your browser.</p>
  </section>

  <section class="steps">
    <div class="step"><h3>1. Click Start</h3><p>Create your meeting room</p></div>
    <div class="step"><h3>2. Share Link</h3><p>Send to anyone</p></div>
    <div class="step"><h3>3. Join</h3><p>Start talking instantly</p></div>
  </section>

<script>
function startCall() {
  const roomId = Math.random().toString(36).substring(2, 8);
  window.location.href = `room.html?room=${roomId}`;
}
function joinCall() {
  const link = prompt("Paste the meeting link:");
  if(link) window.location.href = link;
}
</script>
</body>
</html>

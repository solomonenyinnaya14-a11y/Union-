<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Union - Meet Together. Build Together.</title>
<style>
/* ===== GLOBAL ===== */
* { box-sizing: border-box; margin:0; padding:0; }
body { font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }

/* BRAND COLORS */
:root {
  --navy: #1E3A8A;
  --blue: #2563EB;
  --gray: #f7f8fa;
}

/* ===== INDEX/LANDING PAGE ===== */
.landing-body { background:var(--gray); color:#1a1a1a; overflow:auto; }

nav { background:white; padding:12px 20px; display:flex; align-items:center; border-bottom:1px solid #eee; position:sticky; top:0; z-index:10; }

/* LOGO STYLES */
.logo { 
  color:var(--navy); 
  font-size:20px; 
  font-weight:800; 
  display:flex; 
  align-items:center; 
  gap:8px; 
  cursor:pointer;
}
.logo img { 
  height:32px; /* made it bigger */
  width:auto; 
  object-fit:contain; 
}

.nav-btns { margin-left:auto; display:flex; gap:10px; }
.btn-join { background:transparent; border:none; color:var(--blue); font-weight:600; padding:8px 16px; cursor:pointer; font-size:16px; }
.btn-start { background:var(--blue); color:white; border:none; padding:10px 20px; border-radius:50px; font-weight:700; cursor:pointer; font-size:16px; }
  
.hero { text-align:center; padding:60px 20px; background:var(--gray); }
.hero h1 { font-size:42px; font-weight:800; line-height:1.2; }
.hero h1 span { color:var(--blue); }
.hero p { color:#5f6368; margin:16px 0 30px; font-size:16px; }
.hero-btns { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.btn-primary { background:var(--blue); color:white; border:none; padding:14px 24px; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; }
.btn-primary img { height:20px; width:20px; filter:brightness(0) invert(1); } /* logo white on button */
.btn-secondary { background:white; color:var(--blue); border:1px solid #dadce0; padding:14px 24px; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; }
.hero small { display:block; margin-top:16px; color:#5f6368; }

.section { padding:60px 20px; text-align:center; background:white; }
.section h2 { font-size:32px; margin-bottom:40px; font-weight:800; }
.steps { display:grid; gap:30px; max-width:600px; margin:0 auto; }
.step h3 { font-size:20px; margin:8px 0; }
.step p { color:#5f6368; }
  
.features { display:grid; gap:20px; max-width:900px; margin:0 auto; }
.card { background:white; border:1px solid #e0e0e0; border-radius:16px; padding:30px; }
.card h3 { margin:10px 0; font-size:18px; }
.card p { color:#5f6368; }

footer { text-align:center; padding:30px 20px; color:#5f6368; background:var(--gray); }
footer a { color:#1a1a1a; text-decoration:none; margin:0 10px; font-weight:600; }

@media (max-width: 768px) {
  .hero h1 { font-size:32px; }
  .hero-btns { flex-direction:column; }
  .btn-primary, .btn-secondary { width:100%; justify-content:center; }
}
</style>
</head>
<body class="landing-body">

<nav>
  <div class="logo" onclick="showHome()">
    <img src="logo.png" alt="Union Logo">
    Union
  </div>
  <div class="nav-btns">
    <button class="btn-join" onclick="joinCall()">Join</button>
    <button class="btn-start" onclick="startCall()">Start a Call</button>
  </div>
</nav>

  <p>Start a video meeting in 1 click. No downloads, no accounts. Up to 10 people.</p>

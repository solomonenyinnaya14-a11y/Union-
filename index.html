<!DOCTYPE html>
<html>
<body style="background:#000; display:flex; justify-content:center; align-items:center; height:100vh">
  <div>
    <button onclick="startCall()" style="padding:20px 40px; font-size:20px; background:#007AFF; color:white; border:none; border-radius:30px">Start Call</button>
    <button onclick="joinRoom()" style="padding:20px 40px; font-size:20px; background:#333; color:white; border:none; border-radius:30px; margin-left:10px">Join Call</button>
  </div>
<script>
function startCall() {
  const roomId = Math.random().toString(36).substring(2, 8);
  window.location.href = `room.html?room=${roomId}&host=1`;
}
function joinRoom() {
  const link = prompt("Paste the meeting link:");
  if(link) window.location.href = link;
}
</script>
</body>
</html>
